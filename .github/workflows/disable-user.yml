name: Disable user (offboarding)
on:
  workflow_dispatch:
    inputs:
      user_email:
        description: "User email to disable (e.g. john.smith@yourdomain.com)"
        required: true

jobs:
  disable:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate email input
        run: |
          if [[ ! "${{ inputs.user_email }}" =~ ^[^@]+@[^@]+\.[^@]+$ ]]; then
            echo "Invalid email format: ${{ inputs.user_email }}"
            exit 1
          fi
          echo "Email format valid"

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Disable account
        run: |
          az rest --method PATCH \
            --url "https://graph.microsoft.com/v1.0/users/${{ inputs.user_email }}" \
            --headers "Content-Type=application/json" \
            --body '{"accountEnabled": false}'

      - name: Revoke all active sessions
        run: |
          az rest --method POST \
            --url "https://graph.microsoft.com/v1.0/users/${{ inputs.user_email }}/revokeSignInSessions"
