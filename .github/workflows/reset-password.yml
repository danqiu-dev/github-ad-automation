name: Reset user password
on:
  workflow_dispatch:
    inputs:
      user_email:
        description: "User email (e.g. john.smith@iamqiudanoutlook.onmicrosoft.com)"
        required: true
      temp_password:
        description: "Temporary password to set"
        required: true
        default: "TempPass@2026!"
      force_change:
        description: "Force password change on next login?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Reset password via Graph API
        run: |
          az rest --method PATCH \
            --url "https://graph.microsoft.com/v1.0/users/${{ inputs.user_email }}" \
            --headers "Content-Type=application/json" \
            --body '{
              "passwordProfile": {
                "password": "${{ inputs.temp_password }}",
                "forceChangePasswordNextSignIn": ${{ inputs.force_change }}
              }
            }'
