name: Create new user (onboarding)
on:
  workflow_dispatch:
    inputs:
      display_name:
        description: "Full name (e.g. Apple Lee)"
        required: true
      email:
        description: "Email (e.g. apple.lee@yourdomain.com)"
        required: true
      department:
        description: "Department (e.g. IT, Finance, HR)"
        required: true

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Create user via Graph API
        run: |
          az rest --method POST \
            --url "https://graph.microsoft.com/v1.0/users" \
            --headers "Content-Type=application/json" \
            --body '{
              "displayName": "${{ inputs.display_name }}",
              "userPrincipalName": "${{ inputs.email }}",
              "department": "${{ inputs.department }}",
              "accountEnabled": true,
              "mailNickname": "'$(echo '${{ inputs.email }}' | cut -d@ -f1)'",
              "passwordProfile": {
                "password": "Welcome@2026!",
                "forceChangePasswordNextSignIn": true
              }
            }'
