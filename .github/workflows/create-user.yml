name: Create new user (onboarding)
on:
  workflow_dispatch:
    inputs:
      display_name:
        description: "Full name (e.g. Apple Lee)"
        required: true
      email:
        description: "Email (e.g. apple.lee@yourdomain.com)"
        required: true
      department:
        description: "Department (e.g. IT, Finance, HR)"
        required: true

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Validate email input
      run: |
        if [[ ! "${{ inputs.email }}" =~ ^[^@]+@[^@]+\.[^@]+$ ]]; then
          echo "❌ Invalid email format: ${{ inputs.user_email }}"
          exit 1
        fi
        echo "✅ Email format valid"
        
      - name: Azure login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Extract mail nickname
        id: nickname
        run: |
          NICKNAME=$(echo "${{ inputs.email }}" | cut -d@ -f1)
          echo "value=$NICKNAME" >> $GITHUB_OUTPUT

      - name: Create user via Graph API
        run: |
          az rest --method POST \
            --url "https://graph.microsoft.com/v1.0/users" \
            --headers "Content-Type=application/json" \
            --body '{
              "displayName": "${{ inputs.display_name }}",
              "userPrincipalName": "${{ inputs.email }}",
              "department": "${{ inputs.department }}",
              "accountEnabled": true,
              "mailNickname": "${{ steps.nickname.outputs.value }}",
              "passwordProfile": {
                "password": "Welcome@2026!",
                "forceChangePasswordNextSignIn": true
              }
            }'
